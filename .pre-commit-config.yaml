default_install_hook_types: [pre-commit, pre-merge-commit, post-merge]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
        args: ["--unsafe"]
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.17.2
    hooks:
      - id: markdownlint-cli2
        name: Markdownlint
        description: Run markdownlint on your Markdown files
        entry: markdownlint-cli2
        language: node
        types: [markdown]

  - repo: local
    hooks:
      - id: format
        name: Format Python
        language: system  # use system if `ruff` is installed in system/virtualenv
        types: [python]
        entry: ruff
        args: ["format", "--force-exclude"]

      - id: lint
        name: Lint Python
        language: system
        types: [python]
        entry: ruff
        args: ["check", "--fix", "--force-exclude"]
